<mat-card class="quiz-card" [attr.aria-label]="title()">
  <mat-card-header>
    <mat-card-title>{{ title() }}</mat-card-title>
    @if (subtitle()) {
      <mat-card-subtitle>{{ subtitle() }}</mat-card-subtitle>
    }
  </mat-card-header>

  <mat-card-content>
    <ng-content></ng-content>
  </mat-card-content>

  @if (showActions()) {
    <mat-card-actions align="end">
      @if (primaryBtnLabel()) {
        <button
          mat-raised-button
          color="primary"
          (click)="onPrimaryClick()"
          [disabled]="primaryBtnDisabled()"
          [attr.aria-label]="primaryBtnLabel()"
          class="action-btn"
        >
          {{ primaryBtnLabel() }}
        </button>
      }
      @if (secondaryBtnLabel()) {
        <button
          mat-stroked-button
          (click)="onSecondaryClick()"
          [attr.aria-label]="secondaryBtnLabel()"
          class="action-btn"
        >
          {{ secondaryBtnLabel() }}
        </button>
      }
    </mat-card-actions>
  }
</mat-card>
